faq:
  - question: 器材借用要怎麼申請？
    answer: 請依照平台公告的表單與借還規範申請。
  - question: 借用有押金嗎？
    answer: 本平台器材借用不收押金，但需傳院師生身分並遵守借還規範。
  - question: 電腦教室開放時間？
    answer: 開放時間依學期公告與課程使用狀況調整。
